    .mascot-shibu .bm-eye-r { transform-box: view-box; transform-origin: 128px 93px; animation: blink-shibu-r 5s ease-in-out infinite; }
    .mascot-shibu .bm-eye-l { transform-box: view-box; transform-origin: 71.5px 78.5px; animation: blink-shibu-l 5s ease-in-out infinite; }
    @keyframes breathe-mascot-shibu { 0%,100% { transform: translateY(0) scale(1,1); } 45% { transform: translateY(-0.3px) scale(1.002,1.007); } }
    @keyframes blink-shibu-r { 0%,90%,100% { transform: rotate(0) scaleY(1); } 94% { transform: rotate(7deg) scaleY(0.08); } 97% { transform: rotate(0) scaleY(1); } }
    @keyframes blink-shibu-l { 0%,90%,100% { transform: rotate(0) scaleY(1); } 94% { transform: rotate(7deg) scaleY(0.08); } 97% { transform: rotate(0) scaleY(1); } }
    @media (prefers-reduced-motion: reduce) { .mascot-shibu .bm-body, .mascot-shibu .bm-eye-r, .mascot-shibu .bm-eye-l { animation: none; } }
