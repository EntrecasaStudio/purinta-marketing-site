<!--
  Standalone, self-contained animated mascot.
  No external files, no background, no floor shadow, no vertical bobbing —
  just breath, blink, body sway/tilt, and arm/foot motion.

  Three ways to use this in another site:
    1) Drop the file in and open directly.
    2) <iframe src="mascot-embed.html" style="border:0;background:transparent;"></iframe>
    3) Copy the .purinta-mascot-host div + <style> + <script> block into
       any target page. The script auto-mounts on every
       .purinta-mascot-host .mascot-animated it finds.

  To resize, change the `width` of `.purinta-mascot-host`. Aspect ratio is
  preserved automatically. To mirror horizontally (face the other way), add
  `transform: scaleX(-1)` to `.purinta-mascot-host`.
-->

  .purinta-mascot-host {
    /* When loaded as an iframe the host fills the iframe rect; the
     * iframe's own width/height controls the rendered size. */
    width: 100%;
    height: 100%;
    position: relative;
  }
  .purinta-mascot-host > .mascot-animated {
    position: absolute; inset: 0; width: 100%; height: 100%;
  }
  .purinta-mascot-host svg {
    width: 100%; height: 100%; display: block; overflow: visible;
  }
  /* ─── EMBED BLOCK (copy until here ↑) ────────────────────────────── */
</style>

  /* Suffix every internal SVG id + url() ref per instance so multiple
     copies on the same page don't collide on defs / gradients / masks /
     clip-paths. Without this the second host would render with the first
     host's defs and the masks would break. */
  function uniquifyIds(svgEl, suffix) {
    var temp = document.createElement('div');
    temp.appendChild(svgEl);
    var html = temp.innerHTML;
    var ids = new Set(), idRe = /\bid="([^"]+)"/g, m;
    while ((m = idRe.exec(html)) !== null) ids.add(m[1]);
    ids.forEach(function(id) {
      var esc = id.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      html = html.replace(new RegExp('\\bid="' + esc + '"', 'g'), 'id="' + id + suffix + '"');
      html = html.replace(new RegExp('url\\(#' + esc + '\\)', 'g'), 'url(#' + id + suffix + ')');
      html = html.replace(new RegExp('(\\b(?:xlink:)?href=)"#' + esc + '"', 'g'), '$1"#' + id + suffix + '"');
    });
    temp.innerHTML = html;
    return temp.firstElementChild;
  }

  /* Single rAF ticker shared across every host on the page. New
     instances push their step(time) into TICK_INSTANCES; the loop fans
     them out each frame. Cheaper than one rAF per host. */
  var TICK_INSTANCES = [];
  var tickerOn = false;
  function startTicker() {
    if (tickerOn) return; tickerOn = true;
    (function tick(time) {
      for (var i = 0; i < TICK_INSTANCES.length; i++) TICK_INSTANCES[i](time);
      requestAnimationFrame(tick);
    })(performance.now());
  }

  function runMascot(wrapper, suffix) {
    var svg = new DOMParser().parseFromString(SVG_RAW, 'image/svg+xml').documentElement;
    svg = uniquifyIds(svg, suffix);
    svg.style.width = '100%'; svg.style.height = '100%';
    svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');

    var allKids = Array.from(svg.children);
    var defs = allKids.find(function(e) { return e.tagName.toLowerCase() === 'defs'; });
    var masks = allKids.filter(function(e) { return e.tagName.toLowerCase() === 'mask'; });
    var els = allKids.filter(function(e) {
      var t = e.tagName.toLowerCase(); return t !== 'defs' && t !== 'mask';
    });

    /* Re-group the flat path list into named regions. Indices come from
       the order paths appear in mascot-base.svg — they map to:
         0-8   feet
         9-21  body torso (mainBody, default bucket)
         22-37 eyes
         38-39 cheeks
         41    mouth outline
         42    tongue
         43    teeth
         46-49 right hand
         50-52 left hand
       Mouth (path 40) is rebuilt from MOUTH_PATH below so we skip it. */
    var feet = g('feet'), bodyGroup = g('bodyGroup'), mainBody = g('mainBody');
    var eyesOpen = g('eyesOpen'), cheeks = g('cheeks');
    var mouthOuter = g('mouthOuter'), mouthBg = g('mouthBg'), teeth = g('teeth');
    var tongue = g('tongue'), rightHand = g('rightHand'), leftHand = g('leftHand');

    /* Eyes squish around their own centre — fill-box anchors origin to
       the group bbox, the 80 ms transition smooths each wink/unwink. */
    eyesOpen.style.transformBox = 'fill-box';
    eyesOpen.style.transformOrigin = 'center';
    eyesOpen.style.transition = 'transform 80ms ease-out';

    els.forEach(function(e, i) {
      if (i <= 8) feet.appendChild(e);
      else if (i >= 22 && i <= 37) eyesOpen.appendChild(e);
      else if (i >= 38 && i <= 39) cheeks.appendChild(e);
      else if (i === 41) mouthOuter.appendChild(e);
      else if (i === 42) tongue.appendChild(e);
      else if (i === 43) teeth.appendChild(e);
      else if (i >= 46 && i <= 49) rightHand.appendChild(e);
      else if (i >= 50 && i <= 52) leftHand.appendChild(e);
      else mainBody.appendChild(e);
    });

    mouthBg.appendChild(el('path', { d: MOUTH_PATH, fill: '#185229' }));
    mouthOuter.appendChild(el('path', {
      d: MOUTH_PATH, fill: 'none', stroke: '#185229',
      'stroke-width': '4', 'stroke-linejoin': 'round'
    }));

    while (svg.firstChild) svg.removeChild(svg.firstChild);
    svg.appendChild(defs);
    masks.forEach(function(m) { svg.appendChild(m); });
    svg.appendChild(feet);
    bodyGroup.appendChild(mainBody); bodyGroup.appendChild(eyesOpen);
    bodyGroup.appendChild(cheeks); bodyGroup.appendChild(mouthBg);
    bodyGroup.appendChild(mouthOuter); bodyGroup.appendChild(teeth);
    bodyGroup.appendChild(tongue); bodyGroup.appendChild(rightHand);
    bodyGroup.appendChild(leftHand);
    svg.appendChild(bodyGroup);

    wrapper.innerHTML = '';
    wrapper.appendChild(svg);

    if (REDUCED_MOTION) return;

    var tongueCx = 350, tongueCy = 445, teethCx = 350, teethCy = 395;

    /* ≈30 FPS throttle. Sub-2 Hz motion looks identical at 30 vs 60 FPS
       but halves the per-frame setAttribute cost. */
    var lastT = 0;
    function tick(time) {
      if (time - lastT < 33) return;
      lastT = time;
      var t = time * 0.001;
      var bv = noise(t, 1.8, BREATH_NOISE), bn = bv * 0.5 + 0.5;
      var sy = 1 + bn * 0.035 + Math.sin(t * 1.1) * 0.008;
      var sx = 1 + (1 - bn) * 0.015;
      var bl = -(bn * 8.0 + Math.sin(t * 0.9 + 1.0) * 2.0);
      var swX = noise(t, 0.30, SWAY_NOISE) * 3.5;
      var swY = noise(t, 0.25, [[1.0,0.35,1.5],[1.618,0.22,3.0],[0.5,0.18,0.5]]) * 1.8;
      var tilt = noise(t, 0.22, TILT_NOISE) * 1.2;
      bodyGroup.setAttribute('transform',
        'translate(' + (428.5 + swX) + ' ' + (620 + swY + bl) + ') ' +
        'rotate(' + tilt + ') scale(' + sx + ' ' + sy + ') translate(-428.5 -620)');

      var fs = noise(t - 0.4, 0.30, SWAY_NOISE) * 0.8;
      var ft = noise(t - 0.4, 0.22, TILT_NOISE) * 0.3;
      feet.setAttribute('transform', 'translate(' + fs + ' 0) rotate(' + ft + ' 428.5 870)');

      var ha = 3.5, hs = 0.55;
      var lr = noise(t, hs, [[1.0,0.50,0],[1.618,0.30,1.2],[0.786,0.18,3.5],[2.414,0.08,5.2]]) * ha;
      var lb = noise(t, hs * 0.7, [[1.0,0.4,0.8],[1.414,0.25,2.5]]) * ha * 0.4;
      leftHand.setAttribute('transform', 'translate(0 ' + lb + ') rotate(' + lr + ' 150 380)');
      var rr = noise(t, hs, [[1.0,0.45,1.5],[1.414,0.28,0.8],[0.618,0.20,4.0],[1.932,0.07,6.1]]) * ha * 0.85;
      var rb = noise(t, hs * 0.75, [[1.0,0.35,2.0],[1.618,0.20,3.8]]) * ha * 0.3;
      rightHand.setAttribute('transform', 'translate(0 ' + rb + ') rotate(' + rr + ' 575 475)');

      var cp = 1 + bn * 0.020 + Math.sin(t * 1.1 + 0.5) * 0.010;
      cheeks.setAttribute('transform', 'translate(345 420) scale(' + cp + ' ' + cp + ') translate(-345 -420)');

      var ty = bn * -3.0 + Math.sin(t * 0.9 + 0.3) * 0.8;
      var tx = noise(t, 0.5, [[1.0,0.3,1.0],[1.618,0.2,3.3]]) * 1.2;
      var tsx = 1 + bn * 0.025 + Math.sin(t * 1.2) * 0.008;
      var tsy = 1 + (1 - bn) * 0.020 + Math.cos(t * 0.8 + 0.5) * 0.006;
      var tr = noise(t, 0.4, [[1.0,0.35,0.5],[1.414,0.20,2.8]]) * 1.5;
      tongue.setAttribute('transform', 'translate(' + (tongueCx + tx) + ' ' + (tongueCy + ty) + ') rotate(' + tr + ') scale(' + tsx + ' ' + tsy + ') translate(' + (-tongueCx) + ' ' + (-tongueCy) + ')');

      var tey = (1 - bn) * 2.5 + Math.sin(t * 0.9 + 1.5) * 0.4;
      var tex = noise(t, 0.4, [[1.0,0.15,2.0],[1.414,0.10,4.1]]) * 0.5;
      var tesx = 1 + (1 - bn) * 0.012;
      var tesy = 1 + bn * 0.015;
      teeth.setAttribute('transform', 'translate(' + (teethCx + tex) + ' ' + (teethCy + tey) + ') scale(' + tesx + ' ' + tesy + ') translate(' + (-teethCx) + ' ' + (-teethCy) + ')');
    }
    TICK_INSTANCES.push(tick);
    startTicker();

    /* Async blink loop. Wink = rotate(15deg) scaleY(0.06) — the rotation
       composes ON TOP of the squish so the closed eyeline tilts slightly
       (perspective hint without needing per-eye paths). */
    function wink()   { eyesOpen.style.transform = 'rotate(15deg) scaleY(0.06)'; }
    function unwink() { eyesOpen.style.transform = 'rotate(0deg) scaleY(1)'; }
    function blink(dur) { return new Promise(function(ok) { wink(); setTimeout(function() { unwink(); ok(); }, dur + Math.random() * 40); }); }
    function wait(ms) { return new Promise(function(ok) { setTimeout(ok, ms); }); }
    async function blinkLoop() {
      while (true) {
        unwink();
        await wait(2200 + Math.random() * 1000);
        await blink(110);
        await wait(1800 + Math.random() * 800);
        if (Math.random() < 0.6) { await blink(85); await wait(120 + Math.random() * 50); await blink(95); await wait(1400 + Math.random() * 600); }
        wink(); await wait(320 + Math.random() * 120); unwink();
        await wait(2000 + Math.random() * 1000);
        await blink(100);
        await wait(2500 + Math.random() * 1200);
        if (Math.random() < 0.3) { for (var i = 0; i < 3; i++) { await blink(70 + Math.random() * 30); await wait(100 + Math.random() * 40); } await wait(1500 + Math.random() * 800); }
      }
    }
    blinkLoop();
  }

  /* Auto-mount on every .purinta-mascot-host > .mascot-animated. Multiple
     copies on the same page are fine — uniquifyIds keeps each instance's
     defs isolated. */
  var hosts = document.querySelectorAll('.purinta-mascot-host .mascot-animated');
  hosts.forEach(function(wrapper, idx) { runMascot(wrapper, '-pm' + idx); });
})();
</script>
