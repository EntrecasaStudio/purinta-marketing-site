<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <!-- DS fonts: ohno-softie-variable (display) + Rubik (UI/body) -->
    <link rel="preconnect" href="https://use.typekit.net" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://use.typekit.net/rne3qwz.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700&display=swap"
    />
    <!-- Hero parallax layers: preloaded so they land in the cache
         before the entrance fade starts (the fade is gated on ALL of
         them decoding). Ordered back-to-front. The old flat
         background.webp composite was removed — the layers fully
         reconstruct the scene, so preloading it was wasted bandwidth
         that also delayed the fade. -->
    <link rel="preload" as="image" href="/assets/figma/hero-layers/01-base.webp" fetchpriority="high" />
    <link rel="preload" as="image" href="/assets/figma/hero-layers/02-tree-L.webp" fetchpriority="high" />
    <link rel="preload" as="image" href="/assets/figma/hero-layers/03-tree-R.webp" fetchpriority="high" />
    <link rel="preload" as="image" href="/assets/figma/hero-layers/04-grass.webp" fetchpriority="high" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Purinta</title>
    <meta
      name="description"
      content="Purinta is a memecoin collateral market. Deposit your memecoins, borrow USDC and enjoy the extra liquidity. The financial infrastructure memecoins deserve."
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
